const fmt=(n,d=2)=>(n??0).toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d});

const fmtPct=n=>(n>=0?"+":"")+fmt(n,1)+"%";

/* ── Binance API ──────────────────────────────────────────── */
async function fetchCandles(symbol,interval,limit){
  const url=`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`;
  const r=await fetch(url);
  if(!r.ok) throw new Error("Binance hatası: "+r.status);
  const d=await r.json();
  if(!Array.isArray(d)||!d.length) throw new Error("Veri boş.");
  return d.map(k=>({
    date:new Date(k[0]).toLocaleDateString("tr-TR",{month:"numeric",day:"numeric"}),
    price:parseFloat(k[4]),
  }));
}

/* ── RSI ──────────────────────────────────────────────────── */
function calcRSI(prices,period){
  const out=new Array(prices.length).fill(null);
  if(prices.length<period+1) return out;
  let ag=0,al=0;
  for(let i=1;i<=period;i++){const d=prices[i].price-prices[i-1].price;if(d>0)ag+=d;else al-=d;}
  ag/=period;al/=period;
  for(let i=period;i<prices.length;i++){
    if(i>period){const d=prices[i].price-prices[i-1].price;ag=(ag*(period-1)+(d>0?d:0))/period;al=(al*(period-1)+(d<0?-d:0))/period;}
    out[i]=parseFloat((100-100/(1+(al===0?100:ag/al))).toFixed(2));
  }
  return out;
}

/* ── OKX DCA Backtest Motoru ──────────────────────────────── */
/*
  OKX mantığı:
  - Price steps → ilk alım fiyatına (initial price) göre hesaplanır
  - SO1 fiyatı = initial_price × (1 - step/100)
  - SO2 fiyatı = SO1_fiyatı   × (1 - step × stepMult / 100)
  - SO3 fiyatı = SO2_fiyatı   × (1 - step × stepMult² / 100)
  - SO miktarı  = safetyAmt × amtMult^(n-1)
  - TP → ortalama maliyete göre (avg cost)
  - Stop Loss → ilk alım fiyatına göre (initial price)
  - RSI başlatma → günlük RSI < eşik ise deal aç
*/
function runBacktest(prices,cfg,startCond,rsiCfg){
  const {
    initialAmt,safetyAmt,priceStep,stepMult,amtMult,
    maxSafetyOrders,tpPct,slPct,startCapital,cooldown
  }=cfg;

  const dailyRSI=calcRSI(prices,rsiCfg.period);

  const deals=[],equity=[];
  let cash=startCapital,inDeal=false,deal=null,cdLeft=0;
  let waitRSI=(startCond.type==="rsi");

  for(let i=0;i<prices.length;i++){
    const {price,date}=prices[i];

    // RSI başlatma koşulu
    if(waitRSI&&!inDeal&&cdLeft===0){
      const rsiNow=dailyRSI[i];
      if(rsiNow==null){equity.push({date,value:cash,price,rsi:rsiNow});continue;}
      const triggered=startCond.rsiDir==="lt"?rsiNow<rsiCfg.threshold:rsiNow>rsiCfg.threshold;
      if(!triggered){equity.push({date,value:cash,price,rsi:rsiNow});continue;}
      waitRSI=false; // tetiklendi, devam et
    }

    if(!inDeal){
      if(cdLeft>0){
        cdLeft--;
        if(startCond.type==="rsi") waitRSI=true;
        equity.push({date,value:cash,price,rsi:dailyRSI[i]});
        continue;
      }
      // Deal aç
      if(cash<initialAmt){equity.push({date,value:cash,price,rsi:dailyRSI[i]});continue;}
      cash-=initialAmt;

      // OKX: güvenlik emri fiyatlarını önceden hesapla
      const soLevels=[];
      let stepAcc=priceStep, levelPrice=price*(1-priceStep/100);
      for(let n=0;n<maxSafetyOrders;n++){
        let soAmt=safetyAmt*Math.pow(amtMult,n);
        soLevels.push({price:levelPrice,amt:soAmt,filled:false});
        const nextStep=stepAcc*stepMult;
        levelPrice=levelPrice*(1-nextStep/100);
        stepAcc=nextStep;
      }

      deal={
        startDate:date,
        initPrice:price,
        orders:[{date,price,size:initialAmt,qty:initialAmt/price}],
        totalCost:initialAmt,
        totalQty:initialAmt/price,
        avgCost:price,
        safetyCount:0,
        soLevels,
      };
      inDeal=true;
    } else {
      // TP kontrolü (avg cost'a göre)
      const tpPrice=deal.avgCost*(1+tpPct/100);
      if(price>=tpPrice){
        const profit=deal.totalQty*price-deal.totalCost;
        cash+=deal.totalQty*price;
        deals.push({...deal,endDate:date,exitPrice:price,profit,profitPct:profit/deal.totalCost*100,exitReason:"TP"});
        inDeal=false;deal=null;cdLeft=cooldown;
        if(startCond.type==="rsi") waitRSI=true;
        equity.push({date,value:cash,price,rsi:dailyRSI[i]});
        continue;
      }

      // Stop Loss kontrolü (ilk fiyata göre)
      if(slPct>0){
        const slPrice=deal.initPrice*(1-slPct/100);
        if(price<=slPrice){
          const profit=deal.totalQty*price-deal.totalCost;
          cash+=deal.totalQty*price;
          deals.push({...deal,endDate:date,exitPrice:price,profit,profitPct:profit/deal.totalCost*100,exitReason:"SL"});
          inDeal=false;deal=null;cdLeft=cooldown;
          if(startCond.type==="rsi") waitRSI=true;
          equity.push({date,value:cash,price,rsi:dailyRSI[i]});
          continue;
        }
      }

      // Güvenlik emirleri (OKX: ilk fiyata göre seviyeler)
      for(let n=0;n<deal.soLevels.length;n++){
        const lvl=deal.soLevels[n];
        if(!lvl.filled&&price<=lvl.price){
          if(cash<lvl.amt) break; // yetersiz bakiye
          cash-=lvl.amt;
          const qty=lvl.amt/price;
          deal.orders.push({date,price,size:lvl.amt,qty,isSafety:true});
          deal.totalCost+=lvl.amt;
          deal.totalQty+=qty;
          deal.avgCost=deal.totalCost/deal.totalQty;
          deal.safetyCount++;
          lvl.filled=true;
        }
      }
    }

    equity.push({date,value:inDeal?cash+deal.totalQty*price:cash,price,rsi:dailyRSI[i]});
  }

  // Açık deal'i kapat
  if(inDeal&&deal){
    const lp=prices[prices.length-1].price;
    const profit=deal.totalQty*lp-deal.totalCost;
    cash+=deal.totalQty*lp;
    deals.push({...deal,endDate:prices[prices.length-1].date,exitPrice:lp,profit,profitPct:profit/deal.totalCost*100,exitReason:"OPEN"});
  }

  let peak=-Infinity,maxDD=0;
  for(const e of equity){if(e.value>peak)peak=e.value;const dd=(peak-e.value)/peak*100;if(dd>maxDD)maxDD=dd;}
  const tp=deals.reduce((s,d)=>s+d.profit,0);
  const wins=deals.filter(d=>d.profit>0).length;
  const slHits=deals.filter(d=>d.exitReason==="SL").length;

  return{
    deals,equity,
    stats:{
      totalDeals:deals.length,wins,losses:deals.length-wins,slHits,
      winRate:deals.length?wins/deals.length*100:0,
      totalProfit:tp,totalProfitPct:tp/startCapital*100,
      maxDrawdown:maxDD,
      avgSafetyOrders:deals.length?deals.reduce((s,d)=>s+d.safetyCount,0)/deals.length:0,
    }
  };
}

/* ── Bileşenler ───────────────────────────────────────────── */
function Stepper({value,onChange,step=1,min=0,max=99999,decimals=false}){
  const dec=()=>onChange(Math.max(min,parseFloat((value-step).toFixed(decimals?4:0))));
  const inc=()=>onChange(Math.min(max,parseFloat((value+step).toFixed(decimals?4:0))));
  return(
    <div style={{display:"flex",alignItems:"center",gap:6}}>
      <button onClick={dec} style={{width:36,height:36,borderRadius:10,background:"#1e1e2e",border:"none",color:"#f0f0f5",fontSize:22,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
      <input type="number" value={value} onChange={e=>onChange(Math.min(max,Math.max(min,parseFloat(e.target.value)||0)))}
        style={{background:"#0a0a0f",border:"1px solid #2a2a3e",borderRadius:10,color:"#f0f0f5",fontSize:14,fontWeight:700,padding:"7px 4px",width:84,textAlign:"center",fontFamily:"Nunito,sans-serif"}}/>
      <button onClick={inc} style={{width:36,height:36,borderRadius:10,background:"#1e1e2e",border:"none",color:"#f0f0f5",fontSize:22,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
    </div>
  );
}

function ChipRow({items,value,onChange,getLabel,getValue}){
  return(
    <div style={{display:"flex",gap:8,padding:"10px 14px",flexWrap:"wrap"}}>
      {items.map(item=>{
        const v=getValue(item),active=v===value;
        return <button key={v} onClick={()=>onChange(v)} style={{padding:"8px 14px",borderRadius:50,fontSize:13,fontWeight:700,border:active?"2px solid #f7931a":"2px solid #1e1e2e",background:active?"#f7931a22":"#0a0a0f",color:active?"#f7931a":"#5a5a78",cursor:"pointer"}}>{getLabel(item)}</button>;
      })}
    </div>
  );
}

function Row({label,sub,right,last}){
  return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"13px 16px",borderBottom:last?"none":"1px solid #0f0f1e"}}>
      <div>

        {sub&&<div style={{fontSize:11,color:"#3a3a58",marginTop:2}}>{sub}</div>}
      </div>
      {right}
    </div>
  );
}

function PriceTip({active,payload}){
  if(!active||!payload?.length)return null;
  const d=payload[0]?.payload;
  return<div style={{background:"#12121a",border:"1px solid #2a2a3e",borderRadius:10,padding:"8px 12px",fontSize:11}}>
    <div style={{color:"#5a5a78",marginBottom:3}}>{d?.date}</div>
    <div style={{color:"#f7931a",fontWeight:700}}>💼 {fmtUSD(d?.value)}</div>
    <div style={{color:"#4dabf7"}}>💲 {fmtUSD(d?.price)}</div>
    {d?.rsi!=null&&<div style={{color:"#9775fa",marginTop:2}}>RSI: {d.rsi}</div>}
  </div>;
}

function RSITip({active,payload,threshold,dir}){
  if(!active||!payload?.length)return null;
  const d=payload[0]?.payload,rsi=d?.rsi;
  const color=dir==="lt"?(rsi<threshold?"#69db7c":"#9775fa"):(rsi>threshold?"#f85149":"#9775fa");
  return<div style={{background:"#12121a",border:"1px solid #2a2a3e",borderRadius:10,padding:"8px 12px",fontSize:11}}>
    <div style={{color:"#5a5a78",marginBottom:3}}>{d?.date}</div>
    <div style={{color,fontWeight:700}}>RSI: {rsi??'—'}</div>
    <div style={{color:"#9090a8",marginTop:2}}>💲 {fmtUSD(d?.price)}</div>
  </div>;
}

    stepMult:1.0,         // Fiyat adımı katsayısı
    amtMult:1.0,          // Güvenlik emri katsayısı
    maxSafetyOrders:10,   // Maks güvenlik emri

  const [error,setError]=useState(null);

  const updR=k=>v=>setRsiCfg(p=>({...p,[k]:isNaN(parseFloat(v))?v:parseFloat(v)}));

  const minCap=useMemo(()=>{
    let total=cfg.initialAmt,amt=cfg.safetyAmt;
    for(let i=0;i<cfg.maxSafetyOrders;i++){total+=amt;amt*=cfg.amtMult;}
    return total;
  },[cfg]);

  const maxCycleInv=useMemo(()=>{
    let total=cfg.initialAmt,amt=cfg.safetyAmt;
    for(let i=0;i<cfg.maxSafetyOrders;i++){total+=amt;amt*=cfg.amtMult;}
    return total;
  },[cfg]);

  const handleRun=useCallback(async()=>{
    setLoading(true);setError(null);
    try{
      const prices=await fetchCandles(coin,"1d",days);
      setResult(runBacktest(prices,cfg,{...startCond,...rsiCfg},rsiCfg));
      setScreen("result");setTab("stats");
    }catch(e){setError(e.message);}
    finally{setLoading(false);}
  },[coin,days,cfg,startCond,rsiCfg]);

  const coinObj=COINS.find(c=>c.symbol===coin);
  const periodObj=PERIODS.find(p=>p.days===days);

  // Stil sabitleri
  const SEC=(border)=>({margin:"14px 14px 0",background:"#12121a",borderRadius:18,overflow:"hidden",border:border||"1px solid #1e1e2e"});
  const SH=(color)=>({padding:"12px 16px 10px",fontSize:10,fontWeight:800,color:color||"#f7931a",letterSpacing:"0.12em",textTransform:"uppercase",borderBottom:"1px solid #1e1e2e"});
  const TB=(a)=>({flex:1,padding:"10px 0",fontSize:11,fontWeight:800,border:"none",background:a?"#f7931a":"transparent",color:a?"#000":"#5a5a78",borderRadius:12,cursor:"pointer"});
  const CARD=(c)=>({background:"#0a0a0f",borderRadius:16,padding:14,border:`1px solid ${c}33`});

  const lastEquity=result?.equity?.length?result.equity[result.equity.length-1]:null;
  const lastRSI=lastEquity?.rsi;
  const ivl=Math.max(1,Math.floor((result?.equity?.length||1)/6));

  /* ── Başlatma Koşulu Bölümü ── */
  const StartSection=()=>(
    <div style={SEC("1px solid #4dabf744")}>
      <div style={SH("#4dabf7")}>🚀 Başlatma Koşulu</div>

      {/* Anında */}
      <button onClick={()=>setStartCond({type:"instant"})} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px",background:"transparent",border:"none",cursor:"pointer",borderBottom:"1px solid #0f0f1e"}}>
        <div style={{textAlign:"left"}}>
          <div style={{fontSize:15,fontWeight:800,color:startCond.type==="instant"?"#f0f0f5":"#5a5a78"}}>⚡ Anında</div>
          <div style={{fontSize:11,color:"#3a3a58",marginTop:3}}>Döngü başlayınca hemen gir</div>
        </div>
        <div style={{width:24,height:24,borderRadius:"50%",background:startCond.type==="instant"?"#f7931a":"transparent",border:startCond.type==="instant"?"2px solid #f7931a":"2px solid #3a3a58",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"#000",fontWeight:900}}>
          {startCond.type==="instant"&&"✓"}
        </div>
      </button>

      {/* RSI Sinyali */}
      <button onClick={()=>setStartCond({type:"rsi"})} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px",background:"transparent",border:"none",cursor:"pointer",borderBottom:startCond.type==="rsi"?"1px solid #9775fa33":"none"}}>
        <div style={{textAlign:"left"}}>
          <div style={{fontSize:15,fontWeight:800,color:startCond.type==="rsi"?"#9775fa":"#5a5a78"}}>📉 RSI Sinyali</div>
          <div style={{fontSize:11,color:"#3a3a58",marginTop:3}}>RSI koşulu sağlanınca gir</div>

              })}

            <div style={{display:"flex",gap:8}}>
              {[{v:"lt",l:"RSI <"},{v:"gt",l:"RSI >"}].map(o=>{

                return<button key={o.v} onClick={()=>updR("rsiDir")(o.v)} style={{flex:1,padding:"10px",borderRadius:12,fontSize:14,fontWeight:800,border:active?"2px solid #9775fa":"2px solid #1e1e2e",background:active?"#9775fa22":"#0a0a0f",color:active?"#9775fa":"#5a5a78",cursor:"pointer"}}>{o.l}</button>;

          <Row label="Eşik Değeri" sub="RSI bu seviyeye göre değerlendirilir"

          <div style={{margin:"12px 14px",background:"#12121a",borderRadius:12,padding:"11px 14px",border:"1px solid #9775fa33"}}>
            <span style={{fontSize:12,color:"#9090a8"}}>
              RSI({rsiCfg.period}) · {TF_OPTIONS.find(t=>t.value===rsiCfg.timeframe)?.label||rsiCfg.timeframe}{" "}
              grafiğinde <span style={{color:"#9775fa",fontWeight:800}}>
                {rsiCfg.rsiDir==="lt"?`< ${rsiCfg.threshold}`:`> ${rsiCfg.threshold}`}
              </span> olunca deal aç
            </span>
          </div>
        </div>
      )}
    </div>
  );

  /* ── Sonuç Ekranı ── */
  const ResultScreen=()=>{
    if(!result)return null;
    const {stats,equity,deals}=result;
    const pc=stats.totalProfit>=0?"#69db7c":"#f85149";

    return<>
      {/* Hero */}
      <div style={{margin:"14px 14px 0",background:"linear-gradient(140deg,#1a1208,#081a0c)",borderRadius:22,padding:"20px 18px",border:"1px solid #f7931a33",textAlign:"center"}}>
        <div style={{fontSize:11,color:"#5a5a78",letterSpacing:"0.1em",marginBottom:8,fontWeight:700}}>
          {coinObj?.label} · {periodObj?.label} · {stats.totalDeals} DÖNGÜ
        </div>
        <div style={{fontSize:44,fontWeight:900,color:pc,lineHeight:1}}>{fmtPct(stats.totalProfitPct)}</div>
        <div style={{fontSize:20,fontWeight:700,color:pc,marginTop:6,opacity:.85}}>
          {stats.totalProfit>=0?"+":""}{fmtUSD(stats.totalProfit)}
        </div>
        <div style={{display:"flex",gap:8,justifyContent:"center",marginTop:14}}>
          {[
            {l:"Win Rate",v:fmtPct(stats.winRate),c:stats.winRate>=50?"#69db7c":"#f85149"},
            {l:"Max DD",v:fmtPct(-stats.maxDrawdown),c:"#f85149"},
            {l:"Ort. Safety",v:fmt(stats.avgSafetyOrders,1),c:"#fcc419"},
          ].map(({l,v,c})=>(
            <div key={l} style={{flex:1,background:"#0a0a0f88",borderRadius:12,padding:"9px 6px"}}>
              <div style={{fontSize:14,fontWeight:800,color:c}}>{v}</div>
              <div style={{fontSize:10,color:"#4a4a68",marginTop:2}}>{l}</div>
            </div>
          ))}
        </div>
        <div style={{marginTop:12,display:"inline-flex",alignItems:"center",gap:6,background:startCond.type==="rsi"?"#9775fa22":"#f7931a22",borderRadius:50,padding:"5px 14px",fontSize:11,fontWeight:800,color:startCond.type==="rsi"?"#9775fa":"#f7931a",border:`1px solid ${startCond.type==="rsi"?"#9775fa44":"#f7931a44"}`}}>
          {startCond.type==="instant"?"⚡ Anında":`📉 RSI(${rsiCfg.period}) ${rsiCfg.rsiDir==="lt"?"<":">"} ${rsiCfg.threshold} · ${TF_OPTIONS.find(t=>t.value===rsiCfg.timeframe)?.label||rsiCfg.timeframe}`}
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:5,padding:"14px 14px 0"}}>
        {[["stats","📊 Stats"],["chart","📈 Grafik"],["rsi","📉 RSI"],["deals","📋 Döngüler"]].map(([t,l])=>(
          <button key={t} style={TB(tab===t)} onClick={()=>setTab(t)}>{l}</button>
        ))}
      </div>

      {/* Stats */}
      {tab==="stats"&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,padding:14}}>
          {[
            {label:"Toplam Kâr",value:fmtUSD(stats.totalProfit),color:pc},
            {label:"ROI",value:fmtPct(stats.totalProfitPct),color:pc},
            {label:"Win Rate",value:fmtPct(stats.winRate),color:stats.winRate>=50?"#69db7c":"#f85149"},
            {label:"Max Drawdown",value:fmtPct(-stats.maxDrawdown),color:"#f85149"},
            {label:"Toplam Döngü",value:stats.totalDeals,color:"#4dabf7"},
            {label:"Kazanan / Kaybeden",value:`${stats.wins}W / ${stats.losses}L`,color:"#f0f0f5"},
            {label:"Stop Loss İsabeti",value:stats.slHits,color:stats.slHits>0?"#f85149":"#5a5a78"},
            {label:"Ort. Safety Emri",value:fmt(stats.avgSafetyOrders,1),color:"#fcc419"},
          ].map(({label,value,color})=>(
            <div key={label} style={CARD(color)}>
              <div style={{fontSize:20,fontWeight:900,color,lineHeight:1,marginBottom:5}}>{value}</div>
              <div style={{fontSize:10,color:"#4a4a68",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>{label}</div>
            </div>
          ))}
        </div>
      )}

      {/* Chart */}
      {tab==="chart"&&(
        <div style={{margin:"14px 14px 0",background:"#12121a",borderRadius:18,padding:"16px 6px 12px",border:"1px solid #1e1e2e"}}>
          <div style={{fontSize:10,color:"#3a3a58",paddingLeft:12,marginBottom:10,fontWeight:700}}>PORTFÖY & FİYAT</div>
          <ResponsiveContainer width="100%" height={230}>
            <ComposedChart data={equity} margin={{top:0,right:4,left:0,bottom:0}}>
              <CartesianGrid stroke="#1a1a28" strokeDasharray="3 3"/>
              <XAxis dataKey="date" tick={{fill:"#3a3a58",fontSize:9}} tickLine={false} interval={ivl}/>
              <YAxis yAxisId="p" orientation="left" tick={{fill:"#3a3a58",fontSize:9}} tickLine={false} width={46} tickFormatter={v=>v>=1000?"$"+(v/1000).toFixed(1)+"k":"$"+v.toFixed(0)}/>
              <YAxis yAxisId="pr" orientation="right" tick={{fill:"#3a3a58",fontSize:9}} tickLine={false} width={46} tickFormatter={v=>v>=1000?"$"+(v/1000).toFixed(0)+"k":"$"+v.toFixed(0)}/>
              <Tooltip content={<PriceTip/>}/>
              <Area yAxisId="p" type="monotone" dataKey="value" stroke="#f7931a" fill="#f7931a1a" strokeWidth={2.5} dot={false}/>
              <Line yAxisId="pr" type="monotone" dataKey="price" stroke="#4dabf7" strokeWidth={1.5} dot={false} strokeDasharray="5 3"/>
            </ComposedChart>
          </ResponsiveContainer>
          <div style={{display:"flex",gap:18,justifyContent:"center",marginTop:10,fontSize:11,color:"#5a5a78",fontWeight:700}}>
            <span>🟠 Portföy</span><span>🔵 Fiyat</span>
          </div>
        </div>
      )}

      {/* RSI */}
      {tab==="rsi"&&(
        <div style={{padding:"14px",display:"flex",flexDirection:"column",gap:12}}>
          {lastRSI!=null&&(()=>{
            const triggered=rsiCfg.rsiDir==="lt"?lastRSI<rsiCfg.threshold:lastRSI>rsiCfg.threshold;
            const color=triggered?"#69db7c":"#9775fa";
            const bg=triggered?"#082a0a":"#12122a";
            return<div style={{display:"flex",alignItems:"center",gap:12,padding:14,background:bg,borderRadius:14,border:`1px solid ${color}44`}}>
              <div style={{fontSize:32,fontWeight:900,color,minWidth:56,textAlign:"center"}}>{lastRSI}</div>
              <div>
                <div style={{fontSize:13,color,fontWeight:800}}>Son RSI({rsiCfg.period}) · {triggered?"✅ Sinyal Aktif":"⏳ Bekleniyor"}</div>
                <div style={{fontSize:11,color:"#5a5a78",marginTop:3}}>
                  {startCond.type==="rsi"?`RSI ${rsiCfg.rsiDir==="lt"?"<":">"} ${rsiCfg.threshold} koşulu aranıyor`:"RSI göstergesi"}
                </div>
              </div>
            </div>;
          })()}

          <div style={{background:"#12121a",borderRadius:18,padding:"16px 6px 12px",border:"1px solid #1e1e2e"}}>
            <div style={{fontSize:10,color:"#3a3a58",paddingLeft:12,marginBottom:10,fontWeight:700}}>RSI ({rsiCfg.period})</div>
            <ResponsiveContainer width="100%" height={210}>
              <ComposedChart data={equity} margin={{top:0,right:4,left:0,bottom:0}}>
                <CartesianGrid stroke="#1a1a28" strokeDasharray="3 3"/>
                <XAxis dataKey="date" tick={{fill:"#3a3a58",fontSize:9}} tickLine={false} interval={ivl}/>
                <YAxis domain={[0,100]} ticks={[0,20,30,50,70,80,100]} tick={{fill:"#3a3a58",fontSize:9}} tickLine={false} width={28}/>
                <Tooltip content={<RSITip threshold={rsiCfg.threshold} dir={rsiCfg.rsiDir}/>}/>
                <ReferenceLine y={70} stroke="#f8514966" strokeDasharray="4 3" strokeWidth={1}/>
                <ReferenceLine y={30} stroke="#69db7c66" strokeDasharray="4 3" strokeWidth={1}/>
                <ReferenceLine y={50} stroke="#2a2a3e" strokeDasharray="2 4" strokeWidth={1}/>
                {startCond.type==="rsi"&&(
                  <ReferenceLine y={rsiCfg.threshold} stroke="#9775fa" strokeDasharray="3 2" strokeWidth={2}
                    label={{value:`Eşik:${rsiCfg.threshold}`,position:"insideTopLeft",fill:"#9775fa",fontSize:9}}/>
                )}
                <Line type="monotone" dataKey="rsi" stroke="#9775fa" strokeWidth={2} dot={false} connectNulls={false}/>
              </ComposedChart>
            </ResponsiveContainer>
          </div>
        </div>
      )}

      {/* Döngüler */}
      {tab==="deals"&&(
        <div style={{padding:"14px",display:"flex",flexDirection:"column",gap:10}}>
          {deals.map((d,i)=>{
            const isSL=d.exitReason==="SL";
            const isOpen=d.exitReason==="OPEN";
            const borderColor=isSL?"#f85149":d.profit>=0?"#69db7c33":"#f8514933";
            return<div key={i} className="fc" style={{animationDelay:`${i*.03}s`,background:"#12121a",border:`1px solid ${borderColor}`,borderRadius:16,padding:"14px 15px"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                <div>
                  <div style={{fontSize:11,color:"#3a3a58",fontWeight:700}}>
                    #{i+1} · {d.startDate} → {d.endDate}
                    {isSL&&<span style={{color:"#f85149",marginLeft:6,fontSize:10}}>🛑 SL</span>}
                    {isOpen&&<span style={{color:"#fcc419",marginLeft:6,fontSize:10}}>⏳ AÇIK</span>}
                  </div>
                  <div style={{fontSize:12,color:"#6a6a88",marginTop:3}}>
                    Safety: <span style={{color:"#fcc419",fontWeight:800}}>{d.safetyCount}</span>
                    <span style={{margin:"0 5px",color:"#2a2a3e"}}>·</span>
                    Ort: <span style={{color:"#c0c0d8",fontWeight:700}}>{fmtUSD(d.avgCost)}</span>
                  </div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:18,fontWeight:900,lineHeight:1,color:d.profit>=0?"#69db7c":"#f85149"}}>{fmtPct(d.profitPct)}</div>
                  <div style={{fontSize:12,fontWeight:700,marginTop:3,color:d.profit>=0?"#69db7c99":"#f8514999"}}>{d.profit>=0?"+":""}{fmtUSD(d.profit)}</div>
                </div>
              </div>
              <div style={{display:"flex",gap:8}}>
                {[["İlk Giriş",d.initPrice],["Çıkış",d.exitPrice],["Top. Yatırım",d.totalCost]].map(([l,v])=>(
                  <div key={l} style={{flex:1,background:"#0a0a0f",borderRadius:10,padding:"7px 8px"}}>
                    <div style={{fontSize:10,color:"#3a3a58",fontWeight:700}}>{l}</div>
                    <div style={{fontSize:12,color:"#c0c0d8",fontWeight:700,marginTop:2}}>{fmtUSD(v)}</div>
                  </div>
                ))}
              </div>
            </div>;
          })}
        </div>
      )}
    </>;
  };

  /* ── Render ── */
  return(
    <div style={{minHeight:"100vh",background:"#0a0a0f",color:"#f0f0f5",fontFamily:"'Nunito',sans-serif",display:"flex",flexDirection:"column",maxWidth:480,margin:"0 auto"}}>

      {/* Header */}
      <div style={{background:"#0d0d15",borderBottom:"1px solid #1a1a2e",padding:"14px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:20}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {screen==="result"&&<button onClick={()=>setScreen("settings")} style={{background:"#1e1e30",border:"none",color:"#f0f0f5",borderRadius:12,width:36,height:36,cursor:"pointer",fontSize:20,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>}
          <div>
            <div style={{fontWeight:900,fontSize:15,color:"#f7931a"}}>OKX DCA BOT</div>
            <div style={{fontSize:10,color:"#3a3a58",letterSpacing:"0.1em",fontWeight:700}}>BACKTEST SİMÜLATÖRÜ</div>
          </div>
        </div>
        <div style={{background:"#1a1a2e",borderRadius:12,padding:"7px 14px",fontSize:13,fontWeight:800,color:"#f7931a",border:"1px solid #2a2a40"}}>
          {coinObj?.emoji} {coinObj?.label} · {periodObj?.label}
        </div>
      </div>

      <div style={{flex:1,overflowY:"auto",paddingBottom:100}}>
        {screen==="settings"&&<>

          {/* Kripto Para */}
          <div style={SEC()}>
            <div style={SH()}>🪙 İşlem Çifti</div>
            <ChipRow items={COINS} value={coin} onChange={setCoin} getLabel={c=>`${c.emoji} ${c.label}`} getValue={c=>c.symbol}/>
          </div>

          {/* Periyot */}
          <div style={SEC()}>
            <div style={SH()}>📅 Backtest Periyodu</div>
            <ChipRow items={PERIODS} value={days} onChange={setDays} getLabel={p=>p.label} getValue={p=>p.days}/>
          </div>

          {/* Sermaye */}
          <div style={SEC()}>
            <div style={SH()}>💰 Toplam Yatırım Miktarı</div>
            <Row label="Başlangıç Sermayesi ($)" sub="Botun kullanacağı toplam bakiye"
              right={<Stepper value={cfg.startCapital} step={500} min={100} onChange={upd("startCapital")}/>}/>
            <div style={{padding:"10px 16px",display:"flex",gap:8,alignItems:"center"}}>
              <div style={{width:8,height:8,borderRadius:"50%",flexShrink:0,background:maxCycleInv>cfg.startCapital?"#f85149":"#69db7c"}}/>
              <div style={{fontSize:12,fontWeight:700,color:maxCycleInv>cfg.startCapital?"#f85149":"#69db7c"}}>
                {maxCycleInv>cfg.startCapital?`⚠ Tek döngü maks: $${Math.ceil(maxCycleInv)} — yetersiz`:`✓ Tek döngü maks: $${Math.ceil(maxCycleInv)}`}
              </div>
            </div>
          </div>

          {/* OKX DCA Parametreleri */}
          <div style={SEC()}>
            <div style={SH()}>⚙️ Bot Parametreleri</div>

            <Row label="İlk alım miktarı ($)" sub="Her döngünün ilk alım emri büyüklüğü"
              right={<Stepper value={cfg.initialAmt} step={10} min={1} onChange={upd("initialAmt")}/>}/>

            <Row label="Güvenlik emri miktarı ($)" sub="Her güvenlik emrinin başlangıç büyüklüğü"
              right={<Stepper value={cfg.safetyAmt} step={10} min={1} onChange={upd("safetyAmt")}/>}/>

            <Row label="Fiyat adımı (%)" sub="Güvenlik emrinin tetikleneceği fiyat düşüşü"
              right={<Stepper value={cfg.priceStep} step={0.1} min={0.1} decimals onChange={upd("priceStep")}/>}/>

            <Row label="Fiyat adımı katsayısı ×" sub="Her adımda fiyat adımını büyütme oranı"
              right={<Stepper value={cfg.stepMult} step={0.1} min={1} decimals onChange={upd("stepMult")}/>}/>

            <Row label="Güvenlik emri katsayısı ×" sub="Her güvenlik emrinde miktar büyütme oranı"
              right={<Stepper value={cfg.amtMult} step={0.1} min={1} decimals onChange={upd("amtMult")}/>}/>

            <Row label="Maks güvenlik emri" sub="Döngü başına açılabilecek maks emr sayısı"
              right={<Stepper value={cfg.maxSafetyOrders} step={1} min={1} max={100} onChange={upd("maxSafetyOrders")}/>}/>

            <Row label="Döngü kârı (%)" sub="Ortalama maliyetten TP tetikleme oranı"
              right={<Stepper value={cfg.tpPct} step={0.1} min={0.1} decimals onChange={upd("tpPct")}/>}/>

            <Row label="Zarar durdur (%)" sub="İlk giriş fiyatından SL seviyesi (0 = kapalı)"
              right={<Stepper value={cfg.slPct} step={0.5} min={0} decimals onChange={upd("slPct")}/>}/>

            <Row label="Döngüler arası bekleme (gün)" sub="TP/SL sonrası sonraki döngü gecikmesi" last
              right={<Stepper value={cfg.cooldown} step={1} min={0} onChange={upd("cooldown")}/>}/>
          </div>

          {/* Başlatma Koşulu */}
          <StartSection/>

          {error&&<div style={{margin:"14px 14px 0",background:"#1a0808",border:"1px solid #f85149",borderRadius:14,padding:14,fontSize:13,color:"#f85149",lineHeight:1.6}}>⚠ {error}</div>}
        </>}

        {screen==="result"&&<ResultScreen/>}
      </div>

      {/* FAB */}
      {screen==="settings"&&(
        <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,padding:"16px 16px 28px",background:"linear-gradient(to top,#0a0a0f 70%,transparent)",zIndex:20}}>
          <button onClick={handleRun} disabled={loading||maxCycleInv>cfg.startCapital} style={{
            width:"100%",
            background:loading||maxCycleInv>cfg.startCapital?"#1e1e30":"linear-gradient(135deg,#f7931a,#d4780d)",
            color:loading||maxCycleInv>cfg.startCapital?"#5a5a78":"#000",
            fontWeight:900,fontSize:16,border:"none",borderRadius:18,padding:"18px",
            cursor:loading||maxCycleInv>cfg.startCapital?"not-allowed":"pointer",
            boxShadow:loading||maxCycleInv>cfg.startCapital?"none":"0 8px 28px rgba(247,147,26,0.4)",
            fontFamily:"Nunito,sans-serif"
          }}>
            {loading
              ?<span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
                  <span style={{width:18,height:18,border:"3px solid #5a5a7855",borderTop:"3px solid #9090a8",borderRadius:"50%",display:"inline-block",animation:"spin .7s linear infinite"}}/>
                  Veri çekiliyor...
                </span>
              :maxCycleInv>cfg.startCapital?"⚠ Sermaye Yetersiz"
              :"▶ BACKTEST BAŞLAT"}
          </button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
